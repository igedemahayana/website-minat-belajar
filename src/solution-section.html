<!DOCTYPE html>
<html lang="en">

<head>

  <link rel="icon" href="/Ikon SVG/myatech-logo.svg">

<body class="font-[Poppins]">

            <div class="mt-[25px]">

        </div>

        <!-- Kanan -->
        <div class="col-span-12 md:col-span-7 lg:col-span-7 order-1">
