<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Section| Siang 18 February</title>
  <link rel="icon" href="/Ikon SVG/myatech-logo.svg">
  <link rel="stylesheet" href="./css/output.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="font-[Poppins]">
  <!-- Hero Section -->
  <section>
    <div class="mx-auto max-w-[1200px] my-[100px] px-4 py-4">
      <div class="grid grid-cols-12 items-center">
        <!-- Kiri -->
        <div class="col-span-12 md:col-span-6 lg:col-span-6 order-1">
          <div>
            <!-- Button Informasi -->
            <button class="flex gap-4 text-white bg-blue-600 font-regular py-3 px-6 rounded-full">
              <span>
                <img src="/Ikon SVG/college-white.svg" alt="">
              </span>
              Kenapa Myatech ada untuk kita
            </button>

            <!-- Judul -->
            <h1 class="mt-[25px] text-3xl md:text-4xl lg:text-5xl font-semibold leading-tight">
              Belajar Produktif <br>
              Tanpa <span class="text-blue-600">Burnout</span>
            </h1>

            <!-- Deskripsi -->
            <p class="mt-[25px] text-justify lg:text-start">
              Platform belajar yang membantu pelajar tetap fokus, mengatur energi, dan belajar dengan ritme yang sehat —
              bukan sekadar mengejar jam belajar.
            </p>

            <!-- Button -->
            <div class="mt-4 flex flex-col md:flex-row gap-4">
              <a href="#cta-section"
                class="flex bg-blue-600 px-6 py-3 gap-4 text-white rounded-[22px] hover:bg-blue-500 transition duration-400">
                <span>
                  <img src="/Ikon SVG/tangan-white.svg" alt="">
                </span>
                Mulai Fokus Sekarang
              </a>
              <a href="#features-section"
                class="flex bg-black px-6 py-3 gap-4 text-white rounded-[22px] hover:bg-slate-800 transition duration-400">
                <span>
                  <img src="/Ikon SVG/grid.svg" alt="">
                </span>
                Lihat Fitur Kami
              </a>
            </div>
          </div>
        </div>

        <!-- Kanan -->
        <div class="col-span-12 md:col-span-6 lg:col-span-6 order-2">
          <div class="hidden md:block">
            <img src="/Images/Gambar-Hero-Section.svg" alt="">
          </div>
        </div>
      </div>
    </div>
  </section>
</body>

</html>
